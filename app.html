<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbfbe2" />
    <meta
      name="description"
      content="Et varmt, lokalt og installbart bevegelsesrom som fokuserer på omsorg, innsats og kontinuitet."
    />
    <title>Stræva App</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header id="topbar" class="topbar"></header>
      <main id="app" class="app-main" aria-live="polite"></main>
      <nav id="bottom-nav" class="bottom-nav" aria-label="Hovednavigasjon"></nav>
    </div>
    <div id="modal-root"></div>
    <input id="import-input" type="file" accept="application/json" hidden />
    <script type="module" src="/app.js"></script>
  </body>
</html>
