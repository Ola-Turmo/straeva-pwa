<!DOCTYPE html>

<html class="light" lang="no"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-high": "#eaead1",
              "on-secondary-container": "#732010",
              "tertiary": "#74593f",
              "surface-variant": "#e4e4cc",

              "outline": "#75786e",
              "inverse-on-surface": "#f2f2d9",
              "on-primary-container": "#324224",
              "secondary-fixed-dim": "#ffb4a5",
              "on-error": "#ffffff",
              "secondary-fixed": "#ffdad3",
              "on-tertiary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "error": "#ba1a1a",
              "surface-dim": "#dbdcc3",
              "on-background": "#1b1d0e",
              "on-tertiary-fixed": "#2a1704",
              "surface-container-low": "#f5f5dc",
              "on-primary": "#ffffff",
              "primary-container": "#9caf88",
              "error-container": "#ffdad6",
              "secondary": "#9f402d",
              "surface-container-highest": "#e4e4cc",
              "tertiary-fixed": "#ffdcbe",
              "inverse-surface": "#303221",
              "on-secondary-fixed": "#3e0500",
              "on-tertiary-container": "#503922",
              "on-primary-fixed": "#111f05",
              "on-tertiary-fixed-variant": "#5a422a",
              "surface-bright": "#fbfbe2",
              "tertiary-fixed-dim": "#e3c0a0",
              "surface": "#fbfbe2",
              "primary-fixed": "#d5e9bf",
              "secondary-container": "#fd876f",
              "primary": "#526442",
              "on-primary-fixed-variant": "#3b4c2c",
              "on-secondary-fixed-variant": "#802918",
              "outline-variant": "#c5c8bc",
              "on-surface-variant": "#44483f",
              "primary-fixed-dim": "#b9cda4",
              "tertiary-container": "#c4a385",
              "on-secondary": "#ffffff",
              "inverse-primary": "#b9cda4",
              "surface-container": "#efefd7",
              "on-surface": "#1b1d0e"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom soft pulse for the central element as requested */
        @keyframes soft-pulse {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.08); opacity: 0.15; }
            100% { transform: scale(1); opacity: 0.4; }
        }
        .animate-soft-pulse {
            animation: soft-pulse 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-[#FBFBE2] dark:bg-[#1B1D0E] fixed top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-primary-fixed flex items-center justify-center">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="User profile with a soft smile and gentle expression, warm outdoor lighting, minimalist aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5lnwOLtmWVkv0VM5J-b0pMohQQvOqPNaKYZmFn0ZXziSMd4t_0T3v98GUhvA-YeWmhnEhf-8XqnPAzhtrKIvQaUoyCIl95rLp2XDpbUVhuBp87B8C06b4yfe6zHiHvnMLtlA4NS5yywVRL1e3dPR-pkNhAf3Od_LK-y4eWPCJtiy7jcKb3Z8GI9FZFtxAvmtT_GAVZtNj3em7bkY059ZD2AmsTk-aPsiZDo9nDpGWzjnGsiDscr8YgIUwT7Fem67YbV4uu6lkXPl3"/>
</div>
<span class="font-['Plus_Jakarta_Sans'] text-lg font-medium tracking-tight text-[#526442] dark:text-[#D5E9BF]">God morgen, venn</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#F5F5DC] dark:hover:bg-[#2C2E1A] transition-colors active:scale-95 duration-400 ease-in-out">
<span class="material-symbols-outlined text-[#526442] dark:text-[#D5E9BF]" data-icon="sentiment_satisfied">sentiment_satisfied</span>
</button>
</header>
<main class="flex-grow pt-24 pb-32 px-6 flex flex-col items-center justify-center max-w-2xl mx-auto w-full">
<!-- Organic Progress/Pulse Section -->
<div class="relative flex items-center justify-center mb-16">
<!-- Asymmetrical Blobs for Visual Sanctuary -->
<div class="absolute w-80 h-80 bg-primary-fixed opacity-30 blur-3xl animate-soft-pulse rounded-full"></div>
<div class="absolute w-64 h-64 bg-primary-container opacity-20 blur-2xl animate-soft-pulse rounded-full" style="animation-delay: 1s;"></div>
<!-- Central Visual Anchor -->
<div class="relative z-10 w-48 h-48 bg-surface-container-lowest rounded-full shadow-[0_20px_40px_rgba(82,100,66,0.06)] flex flex-col items-center justify-center p-8">
<span class="material-symbols-outlined text-primary text-5xl mb-2" data-icon="air" style="font-variation-settings: 'FILL' 1;">air</span>
<span class="text-on-surface-variant font-medium text-center text-sm">Puls</span>
</div>
<!-- Floating Decorative Element -->
<div class="absolute -top-4 -right-4 w-20 h-20 bg-secondary-fixed opacity-60 rounded-xl blur-xl rotate-12"></div>
</div>
<!-- Affirmation Section -->
<div class="text-center space-y-4 mb-12">
<h1 class="font-headline text-3xl md:text-4xl font-extrabold text-on-surface tracking-tight">Pust rolig. Du gjør det bra.</h1>
<p class="text-on-surface-variant text-lg max-w-xs mx-auto leading-relaxed">
                Stræva følger med på reisen din i ditt eget tempo.
            </p>
</div>
<!-- Metric Toggle / Quiet Mode -->
<div class="w-full flex justify-center mb-8">
<label class="flex items-center gap-4 cursor-pointer p-4 bg-surface-container-low rounded-xl hover:bg-surface-container transition-colors">
<div class="relative inline-flex h-6 w-11 items-center rounded-full bg-outline-variant">
<span class="inline-block h-4 w-4 translate-x-1 rounded-full bg-surface-container-lowest transition transform duration-400 ease-in-out"></span>
</div>
<span class="font-label text-sm font-semibold text-on-surface-variant">Skjule tall</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="visibility_off">visibility_off</span>
</label>
</div>
<!-- Status Card (Bento Style) -->
<div class="grid grid-cols-2 gap-4 w-full">
<div class="bg-surface-container-low p-6 rounded-xl flex flex-col items-start gap-2 border-l-4 border-primary-container">
<span class="material-symbols-outlined text-primary-container" data-icon="forest">forest</span>
<div class="mt-2">
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Sted</p>
<p class="text-on-surface font-semibold">Skogens ro</p>
</div>
</div>
<div class="bg-surface-container-low p-6 rounded-xl flex flex-col items-start gap-2 border-l-4 border-primary-fixed">
<span class="material-symbols-outlined text-primary-fixed-dim" data-icon="timer">timer</span>
<div class="mt-2">
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Tid brukt</p>
<p class="text-on-surface font-semibold">I øyeblikket</p>
</div>
</div>
</div>
</main>
<!-- Contextual Footer Action -->
<div class="fixed bottom-24 left-0 right-0 px-6 z-50 flex justify-center pointer-events-none">
<button class="pointer-events-auto bg-gradient-to-r from-primary to-primary-container text-on-primary px-10 py-5 rounded-full font-headline font-bold text-lg shadow-2xl active:scale-95 transition-all duration-400 flex items-center gap-3">
<span>Jeg er ferdig for nå</span>
<span class="material-symbols-outlined" data-icon="done_all">done_all</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#FBFBE2]/60 dark:bg-[#1B1D0E]/60 backdrop-blur-xl rounded-t-[3rem] border-t border-[#9CAF88]/15 shadow-[0_-10px_40px_rgba(82,100,66,0.06)]">
<button class="flex flex-col items-center justify-center text-[#526442] dark:text-[#9CAF88] px-5 py-2 hover:bg-[#F5F5DC] dark:hover:bg-[#2C2E1A] rounded-full transition-colors active:scale-110 duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]">
<span class="material-symbols-outlined" data-icon="home_heart">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">Hjem</span>
</button>
<button class="flex flex-col items-center justify-center bg-[#9CAF88] dark:bg-[#526442] text-[#FBFBE2] rounded-full px-5 py-2 active:scale-110 duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]">
<span class="material-symbols-outlined" data-icon="self_care" style="font-variation-settings: 'FILL' 1;">self_care</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">Bevegelse</span>
</button>
<button class="flex flex-col items-center justify-center text-[#526442] dark:text-[#9CAF88] px-5 py-2 hover:bg-[#F5F5DC] dark:hover:bg-[#2C2E1A] rounded-full transition-colors active:scale-110 duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]">
<span class="material-symbols-outlined" data-icon="workspace_premium">workspace_premium</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">Mine Seire</span>
</button>
<button class="flex flex-col items-center justify-center text-[#526442] dark:text-[#9CAF88] px-5 py-2 hover:bg-[#F5F5DC] dark:hover:bg-[#2C2E1A] rounded-full transition-colors active:scale-110 duration-400 ease-[cubic-bezier(0.4,0,0.2,1)]">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-semibold mt-1">Fellesskap</span>
</button>
</nav>
</body></html>
